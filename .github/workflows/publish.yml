name: Publish to PyPI

# Fires when you push a version tag (e.g. v0.1.0) or publish a GitHub Release.
# One-time setup required: configure a PyPI Trusted Publisher for this repo at
# https://pypi.org/manage/account/publishing/ (project: ccbookmark,
# workflow: publish.yml, environment: pypi). No API token needed afterwards.

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        run: uv publish
